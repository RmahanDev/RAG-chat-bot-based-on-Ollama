<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline RAG Assistant</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f172a;
            --sidebar: #111827;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --user: #2563eb;
            --bot: #1e293b;
            --accent: #38bdf8;
        }

        body {
            font-family: Inter, Segoe UI, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */

        .sidebar {
            width: 280px;
            background: rgba(17, 24, 39, .9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 25px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .logo span {
            color: var(--accent);
        }

        .status-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .status-title {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .status-value {
            font-size: 18px;
            font-weight: 600;
        }

        .online {
            color: #22c55e;
        }

        /* Main */

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            backdrop-filter: blur(20px);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .header-sub {
            font-size: 13px;
            color: var(--muted);
        }

        .meta {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, .08);

            font-size: 12px;
            color: #94a3b8;
        }

        /* Chat */

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 35px;
        }

        #chat::-webkit-scrollbar {
            width: 8px;
        }

        #chat::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 20px;
        }

        .message {
            display: flex;
            margin-bottom: 20px;
            width: 100%;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 18px;
            line-height: 1.7;
            white-space: pre-wrap;
            width: fit-content;
            min-width: 60px;
        }

        .loading-bubble {
            width: auto !important;
            min-width: unset !important;
            padding: 14px 18px;
        }

        .user .bubble {
            background: var(--user);
        }

        .bot .bubble {
            background: var(--bot);
            border: 1px solid var(--border);
        }

        /* Input */

        .input-wrapper {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            gap: 10px;
            background: rgba(30, 41, 59, .8);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 10px;
        }

        #message {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 15px;
            padding: 10px;
        }

        #message::placeholder {
            color: var(--muted);
        }

        button {
            background: var(--accent);
            border: none;
            color: black;
            font-weight: 600;
            padding: 0 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: .2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .typing {
            display: inline-flex;
            gap: 5px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: .5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media(max-width:900px) {

            .sidebar {
                display: none;
            }

            .bubble {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <div class="sidebar">

            <div class="logo">
                Offline <span>RAG</span>
            </div>

            <div class="status-card">
                <div class="status-title">
                    Model Status
                </div>

                <div class="status-value online">
                    ● Online
                </div>
            </div>

            <div class="status-card">
                <div class="status-title">
                    Backend
                </div>

                <div class="status-value">
                    FastAPI
                </div>
            </div>

            <div class="status-card">
                <div class="status-title">
                    Database
                </div>

                <div class="status-value">
                    ChromaDB
                </div>
            </div>

        </div>

        <div class="main">

            <div class="header">
                <div>
                    <div class="header-title">
                        Offline RAG Assistant
                    </div>

                    <div class="header-sub">
                        Local AI + Ollama + ChromaDB
                    </div>
                </div>
            </div>

            <div id="chat"></div>

            <div class="input-wrapper">

                <div class="input-container">

                    <input id="message" placeholder="Ask something about your documents..." />

                    <button onclick="sendMessage()">
                        Send
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>

        async function sendMessage() {

            const input =
                document.getElementById("message");

            const msg =
                input.value.trim();

            if (!msg) return;

            const chat =
                document.getElementById("chat");

            chat.innerHTML += `
            <div class="message user">
                <div class="bubble">${msg}</div>
            </div>
            `;

            input.value = "";

            const loadingId =
                "loading_" + Date.now();

            chat.innerHTML += `
            <div class="message bot" id="${loadingId}">
                <div class="bubble loading-bubble">
                    <div class="typing">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
            `;

            chat.scrollTop =
                chat.scrollHeight;

            const response =
                await fetch(
                    "http://127.0.0.1:8000/chat",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: msg
                        })
                    }
                );

            const data =
                await response.json();

            const cleanAnswer =
                data.answer.trim();

            document
                .getElementById(loadingId)
                .remove();

            chat.innerHTML += `
<div class="message bot">
    <div class="bubble">
        ${cleanAnswer}
        <div class="meta">
            ⚡ ${data.time}s
            ⭐ ${data.score}/10
        </div>
    </div>
</div>
`;

            chat.scrollTop =
                chat.scrollHeight;
        }

        document
            .getElementById("message")
            .addEventListener("keydown", e => {

                if (e.key === "Enter") {
                    sendMessage();
                }

            });

    </script>

</body>

</html>
